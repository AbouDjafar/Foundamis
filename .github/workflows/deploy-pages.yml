name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare GitHub Pages artifact
        run: |
          node --input-type=module -e "import { pathToFileURL } from 'node:url'; import { mkdir, writeFile } from 'node:fs/promises'; const mod = await import(pathToFileURL('./dist/server/server.js').href); const handler = mod.default; if (!handler || typeof handler.fetch !== 'function') throw new Error('Server entry fetch handler not found'); const res = await handler.fetch(new Request('http://localhost/Foundamis/', { headers: { 'X-TSS_SHELL': 'true' } }), {}, {}); const html = await res.text(); if (!res.ok) throw new Error('Shell render failed with status ' + res.status); await mkdir('./dist/client', { recursive: true }); await writeFile('./dist/client/index.html', html, 'utf8'); await writeFile('./dist/client/404.html', html, 'utf8');"
          touch dist/client/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/client

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
