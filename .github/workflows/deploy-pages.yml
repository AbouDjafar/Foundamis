name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Generate static index and fallback files
        run: |
          node --input-type=module -e "import { pathToFileURL } from 'node:url'; import { writeFile } from 'node:fs/promises'; const mod = await import(pathToFileURL('./dist/server/index.js').href); const handler = mod.default; if (!handler || typeof handler.fetch !== 'function') throw new Error('Server entry fetch handler not found'); const res = await handler.fetch(new Request('http://localhost/Foundamis/'), {}, {}); const html = await res.text(); if (!res.ok) throw new Error('SSR render failed with status ' + res.status); await writeFile('./dist/client/index.html', html, 'utf8');"
          cp dist/client/index.html dist/client/404.html
          touch dist/client/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
